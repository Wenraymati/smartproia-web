name: Release Please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Release Please
        uses: google-github-actions/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

      # After a release is created, you can add deployment steps here
      # The release is complete when ${{ steps.release.outputs.release_created }} == 'true'
      - name: Log release
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "Released version ${{ steps.release.outputs.tag_name }}"
          echo "Release PR merged: ${{ steps.release.outputs.pr }}"
